<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDUAI | Register</title>
    <link rel="stylesheet" href="loginStyle.css">
</head>
<body id="registerPage" class="body">
    <main class="auth-shell">
        <section class="auth-panel" aria-label="Registration form">
            <h1 class="h1">Registration</h1>
            <p class="subtitle">Create your EDUAI account in a few simple steps.</p>

            <form id="registerForm" action="#" method="post" class="form" novalidate>
                <div class="input-type">
                    <label for="name">Username</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                </div>

                <div class="input-type">
                    <label for="phone">Phone Number</label>
                    <input type="number" id="phone" name="phone" placeholder="Enter your number" required>
                </div>

                <div class="input-type">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="input-type">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit">Register</button>

                <p class="switch-text">Already have an account?</p>
                <a href="Frontend.html" class="btn-secondary">Back to Login</a>
            </form>
        </section>
    </main>
    <script src="Signup.js"></script>
</body>
</html>
