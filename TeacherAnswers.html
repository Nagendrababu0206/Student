<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDUAI | Student Submitted Answers</title>
    <link rel="stylesheet" href="teacherStyle.css">
</head>
<body>
    <header class="teacher-topbar">
        <div>
            <p class="eyebrow">Teacher Console</p>
            <h1>Student Submitted Answers</h1>
        </div>
        <div class="top-actions">
            <a class="ghost-btn" href="TeacherDashboard.html">Back to Teacher Home</a>
            <button id="logoutBtn" type="button" class="solid-btn">Logout</button>
        </div>
    </header>

    <main class="teacher-shell">
        <section class="list-panel">
            <h2>Recent Assignment Submissions</h2>
            <p class="empty-state" id="emptyState">Loading submissions...</p>
            <div id="submissionsGrid" class="submissions-grid"></div>
        </section>
    </main>

    <script src="teacherAnswers.js"></script>
</body>
</html>
